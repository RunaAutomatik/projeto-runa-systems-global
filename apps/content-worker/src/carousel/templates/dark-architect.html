<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #0a0a0a;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #f0f0f0;
    overflow: hidden;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px;
    position: relative;
  }

  /* Subtle top-left accent line */
  .slide::before {
    content: '';
    position: absolute;
    top: 72px;
    left: 72px;
    width: 40px;
    height: 2px;
    background: #ffffff;
    opacity: 0.4;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-top: 20px;
  }

  .brand-mark {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 40px;
    padding: 60px 0;
  }

  .title {
    font-size: {{titleSize}};
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: #ffffff;
    max-width: 900px;
  }

  .body {
    font-size: 28px;
    font-weight: 400;
    line-height: 1.6;
    color: rgba(255,255,255,0.65);
    max-width: 820px;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .cta {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  .slide-number {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.2);
  }

  /* Hook slide (first slide) — larger title, no body */
  .slide.hook .title {
    font-size: {{hookTitleSize}};
    max-width: 940px;
  }

  /* Last slide — CTA emphasis */
  .slide.last .cta {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
  }
</style>
</head>
<body>
<div class="slide {{slideClass}}">
  <div class="header">
    <span class="brand-mark">@arthsystems_</span>
  </div>

  <div class="content">
    {{#if title}}
    <h1 class="title">{{title}}</h1>
    {{/if}}
    {{#if body}}
    <p class="body">{{body}}</p>
    {{/if}}
  </div>

  <div class="footer">
    {{#if cta}}
    <span class="cta">Comente {{cta}}</span>
    {{else}}
    <span class="cta">@arthsystems_</span>
    {{/if}}
    <span class="slide-number">{{slideIndex}} / {{totalSlides}}</span>
  </div>
</div>
</body>
</html>
